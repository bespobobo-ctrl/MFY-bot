<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFY Bot Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            overflow-x: hidden;
        }

        /* Glassmorphism Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 10px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Main Sections */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media(min-width: 768px) {
            .main-grid {
                grid-template-columns: 2fr 1.2fr;
            }
        }

        .section-box {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* Chart Canvas */
        canvas {
            max-height: 250px;
        }

        /* Alert Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s;
            z-index: 1000;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1 class="title">MFY Admin Panel 💎</h1>
            <div id="statusBadge"
                style="font-size: 0.8rem; background: rgba(16, 185, 129, 0.2); color: var(--accent); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent);">
                System Live</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Jami Foydalanuvchilar</div>
                <div class="stat-val" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Generatsiya qilingan PDF</div>
                <div class="stat-val" id="totalDocs">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">AI Muvaffaqiyati</div>
                <div class="stat-val" id="aiSuccess">0%</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="section-box">
                <div class="section-title">📊 AI Xizmatlari Statistikasi</div>
                <canvas id="aiChart"></canvas>
            </div>

            <div class="section-box">
                <div class="section-title">💳 To'lov Ma'lumotlari</div>
                <div class="input-group">
                    <label>Humo Card / Karta raqami</label>
                    <input type="text" id="humoCard" placeholder="9860 XXXX XXXX XXXX">
                </div>
                <div class="input-group">
                    <label>Karta egasi</label>
                    <input type="text" id="cardHolder" placeholder="ISMI FAMILIYA">
                </div>
                <button class="btn btn-primary" onclick="updateConfig()">Saqlash ✅</button>
            </div>

            <div class="section-box" style="grid-column: 1 / -1;">
                <div class="section-title">📣 Global Xabar (Broadcast)</div>
                <textarea id="broadcastMsg" rows="4"
                    placeholder="Barcha foydalanuvchilarga xabar yuborish..."></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button class="btn" style="background: rgba(255,255,255,0.1); color: white;"
                        onclick="testBroadcast()">Test (O'zimga)</button>
                    <button class="btn btn-primary" id="broadcastBtn" onclick="sendBroadcast()"
                        style="background: linear-gradient(135deg, #10b981, #059669);">Hamma uchun yuborish 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">Muvaffaqiyatli bajarildi!</div>

    <script>
        let aiChart = null;

        async function fetchStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();

                document.getElementById('totalUsers').textContent = data.totalUsers;
                document.getElementById('totalDocs').textContent = data.totalDocs;

                const totalAI = (data.ai.gemini.success + data.ai.groq.success + data.ai.openai.success);
                const failAI = (data.ai.gemini.fail + data.ai.groq.fail + data.ai.openai.fail);
                const successRate = totalAI + failAI > 0 ? Math.round((totalAI / (totalAI + failAI)) * 100) : 100;
                document.getElementById('aiSuccess').textContent = successRate + '%';

                updateChart(data.ai);
            } catch (e) {
                console.error("Stats fetch error:", e);
            }
        }

        function updateChart(ai) {
            const ctx = document.getElementById('aiChart').getContext('2d');
            const data = {
                labels: ['Gemini', 'Groq', 'OpenAI', 'DeepSeek'],
                datasets: [{
                    label: 'Muvaffaqiyatli so\'rovlar',
                    data: [ai.gemini.success, ai.groq.success, ai.openai.success, ai.deepseek.success],
                    backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444'],
                }]
            };

            if (aiChart) aiChart.destroy();
            aiChart = new Chart(ctx, {
                type: 'bar',
                data: data,
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        async function updateConfig() {
            const card = document.getElementById('humoCard').value;
            const holder = document.getElementById('cardHolder').value;

            await fetch('/api/admin/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: 'PAYMENT_INFO', value: { card, holder } })
            });
            showToast('To\'lov ma\'lumotlari yangilandi!');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if (!msg) return alert('Xabar bo\'sh!');

            if (!confirm('Haqiqatdan ham BARCHA foydalanuvchilarga yubormoqchimisiz?')) return;

            const btn = document.getElementById('broadcastBtn');
            btn.disabled = true;
            btn.textContent = 'Yuborilmoqda...';

            try {
                const res = await fetch('/api/admin/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                showToast(`${data.sent} ta foydalanuvchiga yuborildi!`);
                document.getElementById('broadcastMsg').value = '';
            } catch (e) {
                alert('Xatolik: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Hamma uchun yuborish 🚀';
            }
        }

        // Initial Load
        fetchStats();
        setInterval(fetchStats, 30000); // Har 30 soniyada yangilash
    </script>
</body>

</html>
